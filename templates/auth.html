<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OnyxCAD — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#060a10;--surface:#0b1220;--surface2:#101b2e;--blue:#2b7de9;--blue-bright:#4a9af5;--orange:#e07b39;--text:#b8ccd8;--text-dim:#4a6478;--text-bright:#ddeeff;--border:rgba(43,125,233,0.14);--grid:rgba(43,125,233,0.055)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(43,125,233,0.1) 1px,transparent 1px),linear-gradient(90deg,rgba(43,125,233,0.1) 1px,transparent 1px);background-size:200px 200px}

.auth-card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);padding:48px;width:400px;max-width:90vw}
.auth-card::before,.auth-card::after{content:'';position:absolute;width:12px;height:12px;border:1px solid var(--blue);pointer-events:none}
.auth-card::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
.auth-card::after{bottom:-1px;right:-1px;border-left:none;border-top:none}

.auth-loading{position:absolute;inset:0;background:var(--surface);display:flex;align-items:center;justify-content:center;z-index:10}
.auth-loading.hidden{display:none}
.auth-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.auth-logo{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:28px;color:var(--text-bright);text-align:center;margin-bottom:4px}
.auth-logo .dot{color:var(--blue)}
.auth-logo .cad{color:var(--blue)}
.auth-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);text-align:center;margin-bottom:32px}

.btn-google{width:100%;padding:14px;background:transparent;border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:var(--blue);color:var(--blue-bright)}
.btn-google:disabled{opacity:0.5;cursor:not-allowed}
.btn-google svg{width:18px;height:18px}



.auth-error{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--orange);border:1px solid rgba(224,123,57,0.3);padding:10px 14px;margin-top:16px;display:none}
.auth-back{display:block;text-align:center;margin-top:24px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);text-decoration:none;transition:color 0.2s}
.auth-back:hover{color:var(--blue-bright)}
</style>
</head>
<body>

<div class="auth-card">
    <div class="auth-loading hidden" id="auth-loading">
        <div class="auth-spinner"></div>
    </div>
    <div class="auth-content">
        <div class="auth-logo">Onyx<span class="cad">CAD</span></div>
        <div class="auth-sub">Sign in to continue</div>

<button class="btn-google" id="btn-google">
            <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.20-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.20 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.10z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.70 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.70 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.60 3.30-4.53 6.16-4.53z"/></svg>
            Continue with Google
        </button>

        <div class="auth-error" id="auth-error"></div>

        <a href="/" class="auth-back">← Back to OnyxCAD</a>
    </div>
</div>

<!-- Firebase JS SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
(function () {
    const config = {
        apiKey: "{{ firebase_api_key }}",
        authDomain: "{{ firebase_auth_domain }}",
        projectId: "{{ firebase_project_id }}",
    };

    if (!config.apiKey || !config.projectId) {
        document.getElementById("auth-error").textContent = "Firebase not configured. Contact admin.";
        document.getElementById("auth-error").style.display = "block";
        document.getElementById("btn-google").disabled = true;
        return;
    }

firebase.initializeApp(config);
    const auth = firebase.auth();
    
    // Set persistence to LOCAL by default - persists across browser restarts
    // This gives users long sessions without needing a "remember me" checkbox
    // Must be set before any auth operation
    auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(function() {
        initAuth(auth);
    }).catch(function(err) {
        console.error("Failed to set persistence:", err);
        initAuth(auth);
    });

    function initAuth(auth) {
        const loadingEl = document.getElementById("auth-loading");
        const contentEl = loadingEl.nextElementSibling;
        var authHandled = false;

        /* Check for logout flag — don't auto-redirect after sign-out */
        var url = new URL(window.location.href);
        var justLoggedOut = url.searchParams.has("logout");
        if (justLoggedOut) {
            url.searchParams.delete("logout");
            window.history.replaceState({}, "", url.pathname);
        }

        /* Check if already signed in */
        auth.onAuthStateChanged(function (user) {
            if (authHandled) return;
            authHandled = true;

            if (user && !justLoggedOut) {
                loadingEl.classList.remove("hidden");
                contentEl.style.visibility = "hidden";
                user.getIdToken().then(function (token) {
                    localStorage.setItem("fb_token", token);
                    localStorage.setItem("fb_uid", user.uid);
                    
                    var urlParams = new URLSearchParams(window.location.search);
                    var plan = urlParams.get('plan');
                    var redirectUrl = "/app";
                    if (plan) {
                        redirectUrl += "?checkout=" + plan;
                    }
                    window.location.href = redirectUrl;
                }).catch(function () {
                    loadingEl.classList.remove("hidden");
                    contentEl.style.visibility = "visible";
                    authHandled = false;
                });
            }
        });

        const errorEl = document.getElementById("auth-error");
        function showError(msg) { errorEl.textContent = msg; errorEl.style.display = "block"; }

        /* Google sign-in */
        document.getElementById("btn-google").addEventListener("click", function () {
            var btn = document.getElementById("btn-google");
            btn.disabled = true;
            justLoggedOut = false;
            loadingEl.classList.remove("hidden");
            contentEl.style.visibility = "hidden";

            var provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider)
                .then(function (result) {
                    localStorage.setItem("fb_uid", result.user.uid);
                    return result.user.getIdToken();
                })
                .then(function (token) {
                    localStorage.setItem("fb_token", token);
                    
                    var urlParams = new URLSearchParams(window.location.search);
                    var plan = urlParams.get('plan');
                    var redirectUrl = "/app";
                    if (plan) {
                        redirectUrl += "?checkout=" + plan;
                    }
                    window.location.href = redirectUrl;
                })
                .catch(function (err) {
                    loadingEl.classList.remove("hidden");
                    contentEl.style.visibility = "visible";
                    btn.disabled = false;
                    showError("Sign-in failed: " + err.message);
                });
        });
    }
})();
</script>
</body>
</html>
